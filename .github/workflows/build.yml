name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p build
          g++ -std=c++17 -O3 -pthread -o build/hasher hasher.cpp -lcrypto -lssl

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p build
          g++ -std=c++17 -O3 -pthread -o build/hasher hasher.cpp -I$(brew --prefix openssl)/include -L$(brew --prefix openssl)/lib -lcrypto -lssl

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir build
          g++ -std=c++17 -O3 -pthread -o build/hasher.exe hasher.cpp -lcrypto -lssl

      - name: Upload binaries to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/hasher*
          tag: ${{ github.ref }}
          file_glob: true
          overwrite: true